name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file exe
        run: |
          dotnet publish src/TidalNowPlaying.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o publish

      - name: Copy widget.html into publish folder
        run: copy widget.html publish\widget.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TidalNowPlaying
          path: |
            publish/TidalNowPlaying.exe
            publish/widget.html
          retention-days: 30
