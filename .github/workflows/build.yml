name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - target: Tidal
            exe: TidalNowPlaying.exe
          - target: Spotify
            exe: SpotifyNowPlaying.exe
          - target: Any
            exe: AnyNowPlaying.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish ${{ matrix.target }}
        run: |
          dotnet publish src/TidalNowPlaying.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:AppTarget=${{ matrix.target }} `
            -o publish/${{ matrix.target }}

      - name: Copy widget.html
        run: copy widget.html publish\${{ matrix.target }}\widget.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}NowPlaying
          path: |
            publish/${{ matrix.target }}/${{ matrix.exe }}
            publish/${{ matrix.target }}/widget.html
          retention-days: 30
