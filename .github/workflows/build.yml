name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - target: Tidal
            name: "Tidal Now Playing"
            filter: "tidal"
            filter_mode: "true"
          - target: Spotify
            name: "Spotify Now Playing"
            filter: "Spotify.exe"
            filter_mode: "true"
          - target: Any
            name: "Now Playing"
            filter: ""
            filter_mode: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Write Config.cs for ${{ matrix.target }}
        shell: python
        run: |
          content = f"""// Auto-generated by build workflow — do not edit.
          static class Config
          {{
              public const string AppName    = "${{ matrix.name }}";
              public const string AppFilter  = "${{ matrix.filter }}";
              public const bool   FilterMode = ${{ matrix.filter_mode }};
          }}
          """
          with open("src/Config.cs", "w") as f:
              f.write(content)

      - name: Publish ${{ matrix.target }}
        run: |
          dotnet publish src/TidalNowPlaying.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:AppTarget=${{ matrix.target }} `
            -o publish/${{ matrix.target }}

      - name: Copy widget.html
        run: copy widget.html publish\${{ matrix.target }}\widget.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}NowPlaying
          path: |
            publish/${{ matrix.target }}/${{ matrix.target }}NowPlaying.exe
            publish/${{ matrix.target }}/widget.html
          retention-days: 30
